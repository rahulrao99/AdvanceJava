server:
  port: 8082

spring:
  application:
    name: admin-service

  datasource:
    url: jdbc:mysql://localhost:3306/vehicle_parking_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: your_mysql_password
    driver-class-name: com.mysql.cj.jdbc.Driver

  flyway:
    enabled: false

  cache:
    type: none

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    fetch-registry: true
    register-with-eureka: true
  instance:
    prefer-ip-address: true

jwt:
  secret: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
  expiration: 86400000

logging:
  level:
    com.parking.admin: DEBUG
    org.springframework.security: INFO
    org.springframework.jdbc: DEBUG
